version: 2.1

orbs:
  node: circleci/node@7.2.1
  ruby: circleci/ruby@2.6.0
  twin-servers: ramez/shaka-twin-servers@1.0.1

executors:
  ruby-node-executor:
    docker:
      - image: cimg/ruby:3.3-node
    working_directory: ~/project

commands:
  setup-yarn:
    description: Install Node packages with Yarn
    steps:
      - node/install-packages:
          pkg-manager: yarn

  setup-yarn-and-build-packages:
    description: Install Node packages with Yarn and build all packages
    steps:
      - setup-yarn
      - run:
          name: Build packages
          command: yarn build

  enable-corepack:
    steps:
      - run:
          name: Enable Corepack for Yarn
          command: corepack enable && corepack install

  install-playwright:
    description: Install Playwright Chromium browser with caching
    steps:
      - restore_cache:
          keys:
            - playwright-v1-{{ arch }}-{{ checksum "yarn.lock" }}
            - playwright-v1-{{ arch }}-
      - run:
          name: Install Playwright Chromium
          command: |
            cd demo-ecommerce
            DEBIAN_FRONTEND=noninteractive npx playwright install chromium --with-deps
      - save_cache:
          key: playwright-v1-{{ arch }}-{{ checksum "yarn.lock" }}
          paths:
            - ~/.cache/ms-playwright

jobs:
  jest-tests:
    executor: ruby-node-executor
    steps:
      - checkout
      - setup-yarn-and-build-packages
      - run:
          name: Run shaka-bundle-size tests
          command: yarn workspace shaka-bundle-size test
      - run:
          name: Run shaka-twin-servers tests
          command: yarn workspace shaka-twin-servers test

  build-bundles:
    executor: ruby-node-executor
    resource_class: large
    steps:
      - checkout
      - ruby/install-deps:
          app-dir: demo-ecommerce
      - setup-yarn
      - run:
          name: Build consumer and admin bundles
          command: |
            cd demo-ecommerce
            yarn build:prod:all:stats
      - persist_to_workspace:
          root: .
          paths:
            - demo-ecommerce/public/packs

  bundle-size-check:
    executor: ruby-node-executor
    steps:
      - checkout
      - attach_workspace:
          at: .
      - setup-yarn-and-build-packages
      - run:
          name: Download baseline
          command: |
            cd demo-ecommerce
            yarn bundle-size:download || echo "No baseline found, skipping comparison"
      - run:
          name: Compare bundle sizes
          command: |
            cd demo-ecommerce
            if [ -d "tmp/bundle_size" ]; then
              yarn bundle-size:compare
            else
              echo "No baseline to compare against, passing check"
            fi
      - store_artifacts:
          path: demo-ecommerce/bundle-size-diffs
          destination: bundle-size-diffs

  bundle-size-upload:
    executor: ruby-node-executor
    steps:
      - checkout
      - attach_workspace:
          at: .
      - setup-yarn-and-build-packages
      - run:
          name: Upload bundle size baseline
          command: |
            cd demo-ecommerce
            yarn bundle-size:upload

workflows:
  build-and-check:
    jobs:
      - jest-tests
      - build-bundles

      # Feature branches: download and compare
      - bundle-size-check:
          requires:
            - build-bundles
          filters:
            branches:
              ignore:
                - main

      # Main branch: upload new baseline
      - bundle-size-upload:
          requires:
            - build-bundles
          filters:
            branches:
              only:
                - main

  # Performance, Visual Regression testing workflow with twin servers for A/B testing
  twin-server-tests:
    jobs:
      - twin-servers/build-experiment:
          image-name: demo-ecommerce
          resource-class: medium
          working-directory: demo-ecommerce
          cli-prefix: yarn
          setup-steps:
            - enable-corepack
            - setup-yarn-and-build-packages
          filters:
            branches:
              ignore: main

      - twin-servers/build-control:
          image-name: demo-ecommerce
          resource-class: medium
          working-directory: demo-ecommerce
          cli-prefix: yarn
          project-subdir: demo-ecommerce
          setup-steps:
            - enable-corepack
            - setup-yarn-and-build-packages
          filters:
            branches:
              ignore: main

      - twin-servers/run-tests:
          name: visual-regression
          requires:
            - twin-servers/build-experiment
            - twin-servers/build-control
          resource-class: medium
          working-directory: demo-ecommerce
          cli-prefix: yarn
          setup-steps:
            - enable-corepack
            - setup-yarn-and-build-packages
          server-command: 'bundle exec puma -C config/puma.rb -b tcp://0.0.0.0:3000'
          post-steps:
            - install-playwright
            - run:
                name: Run visual regression -- generate reference images
                command: |
                  cd demo-ecommerce
                  yarn visreg:reference
            - run:
                name: Run visual regression -- test
                command: |
                  cd demo-ecommerce
                  yarn visreg:test:retry
            - store_artifacts:
                path: demo-ecommerce/backstop_data/html_report
                destination: visreg-report
            - store_artifacts:
                path: demo-ecommerce/backstop_data/bitmaps_reference
                destination: bitmaps_reference
            - store_artifacts:
                path: demo-ecommerce/backstop_data/bitmaps_test
                destination: bitmaps_test
            - store_test_results:
                path: demo-ecommerce/backstop_data/ci_report
          filters:
            branches:
              ignore: main

      - twin-servers/run-tests:
          name: perf-tests
          requires:
            - twin-servers/build-experiment
            - twin-servers/build-control
          resource-class: medium
          working-directory: demo-ecommerce
          cli-prefix: yarn
          setup-steps:
            - enable-corepack
            - setup-yarn-and-build-packages
          server-command: 'bundle exec puma -C config/puma.rb -b tcp://0.0.0.0:3000'
          # TODO: Replace with actual performance test command (e.g., k6, Playwright, ab)
          test-command: "mkdir -p /home/circleci/app/perf-results && echo 'Running performance tests...' > /home/circleci/app/perf-results/test-output.txt"
          post-steps:
            - run:
                name: Collect results from both containers
                command: |
                  mkdir -p /tmp/perf-results
                  cp -r ~/demo_ecommerce_control_docker_volume/perf-results /tmp/perf-results/control || true
                  cp -r ~/demo_ecommerce_experiment_docker_volume/perf-results /tmp/perf-results/experiment || true
          filters:
            branches:
              ignore: main
