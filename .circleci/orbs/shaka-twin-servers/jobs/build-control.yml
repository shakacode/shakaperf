description: |
  Build the control Docker image from the merge-base with main branch.

executor:
  name: machine
  resource-class: << parameters.resource-class >>

parameters:
  resource-class:
    type: enum
    enum: ["medium", "large", "xlarge", "2xlarge"]
    default: "large"
    description: "Machine resource class"
  base-branch:
    type: string
    default: "origin/main"
    description: "Branch to find merge-base against"
  control-dir:
    type: string
    default: "/home/circleci/control_checkout"
    description: "Directory for control checkout"
  project-subdir:
    type: string
    default: ""
    description: "Subdirectory within repo containing the project"
  dockerfile-path:
    type: string
    default: "Dockerfile.production"
    description: "Path to Dockerfile relative to project"
  working-directory:
    type: string
    default: "."
    description: "Directory containing twin-servers.config.ts"
  image-name:
    type: string
    description: "Docker image name"
  config-path:
    type: string
    default: ""
    description: "Custom config file path"
  verbose:
    type: boolean
    default: false
    description: "Enable verbose output"
  cli-prefix:
    type: string
    default: "npx"
    description: "Command prefix to invoke shaka-twin-servers (e.g., npx, yarn, pnpm)"
  setup-steps:
    type: steps
    default: []
    description: "Steps to run before build (use this for package manager setup)"
steps:
  - checkout
  - setup-node
  - steps: << parameters.setup-steps >>
  - checkout-control:
      base-branch: << parameters.base-branch >>
      control-dir: << parameters.control-dir >>
      project-subdir: << parameters.project-subdir >>
      dockerfile-path: << parameters.dockerfile-path >>
  - build-image:
      target: control
      working-directory: << parameters.working-directory >>
      config-path: << parameters.config-path >>
      verbose: << parameters.verbose >>
      cli-prefix: << parameters.cli-prefix >>
  - save-image:
      image-name: << parameters.image-name >>
      target: control
