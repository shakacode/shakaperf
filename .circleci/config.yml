version: 2.1

orbs:
  node: circleci/node@7.2.1
  ruby: circleci/ruby@2.6.0

executors:
  ruby-node-executor:
    docker:
      - image: cimg/ruby:3.3-node
    working_directory: ~/project

  machine-executor:
    machine:
      image: ubuntu-2204:2023.10.1
    resource_class: large

jobs:
  build-bundles:
    executor: ruby-node-executor
    resource_class: large
    steps:
      - checkout
      - ruby/install-deps:
          app-dir: demo-ecommerce
      - node/install-packages:
          pkg-manager: yarn
      - run:
          name: Build consumer and admin bundles
          command: |
            cd demo-ecommerce
            yarn build:prod:all:stats
      - persist_to_workspace:
          root: .
          paths:
            - demo-ecommerce/public/packs

  bundle-size-check:
    executor: ruby-node-executor
    steps:
      - checkout
      - attach_workspace:
          at: .
      - node/install-packages:
          pkg-manager: yarn
      - run:
          name: Build packages
          command: yarn build
      - run:
          name: Download baseline
          command: |
            cd demo-ecommerce
            yarn bundle-size:download || echo "No baseline found, skipping comparison"
      - run:
          name: Compare bundle sizes
          command: |
            cd demo-ecommerce
            if [ -d "tmp/bundle_size" ]; then
              yarn bundle-size:compare
            else
              echo "No baseline to compare against, passing check"
            fi
      - store_artifacts:
          path: demo-ecommerce/bundle-size-diffs
          destination: bundle-size-diffs

  bundle-size-upload:
    executor: ruby-node-executor
    steps:
      - checkout
      - attach_workspace:
          at: .
      - node/install-packages:
          pkg-manager: yarn
      - run:
          name: Build packages
          command: yarn build
      - run:
          name: Upload bundle size baseline
          command: |
            cd demo-ecommerce
            yarn bundle-size:upload

  # Performance testing jobs for A/B testing with twin servers
  build-experiment-image:
    executor: machine-executor
    steps:
      - checkout
      - run:
          name: Build experiment Docker image
          command: |
            docker build -t demo-ecommerce:experiment-${CIRCLE_SHA1} \
              -f demo-ecommerce/Dockerfile.production \
              --build-arg UID=$(id -u) \
              --build-arg GID=$(id -g) \
              --build-arg NON_ROOT_USER=$(whoami) \
              --build-arg RUBY_VERSION=3.3.7 \
              --build-arg NODE_VERSION=24.13.0 \
              .
      - run:
          name: Save Docker image
          command: |
            mkdir -p /tmp/docker-images
            docker save -o /tmp/docker-images/experiment.tar demo-ecommerce:experiment-${CIRCLE_SHA1}
      - persist_to_workspace:
          root: /tmp
          paths:
            - docker-images/experiment.tar

  build-control-image:
    executor: machine-executor
    steps:
      - checkout
      - run:
          name: Copy Dockerfile to temp location
          command: |
            mkdir -p /tmp/docker-build
            cp demo-ecommerce/Dockerfile.production /tmp/docker-build/
      - run:
          name: Checkout control (merge-base with main)
          command: |
            MERGE_BASE=$(git merge-base HEAD origin/main)
            mkdir -p /home/circleci/control_checkout
            git worktree add /home/circleci/control_checkout $MERGE_BASE
      - run:
          name: Build control Docker image
          command: |
            # Copy the Dockerfile from current branch into the master checkout
            cp /tmp/docker-build/Dockerfile.production /home/circleci/control_checkout/demo-ecommerce/
            cd /home/circleci/control_checkout
            docker build -t demo-ecommerce:control-${CIRCLE_SHA1} \
              -f demo-ecommerce/Dockerfile.production \
              --build-arg UID=$(id -u) \
              --build-arg GID=$(id -g) \
              --build-arg NON_ROOT_USER=$(whoami) \
              --build-arg RUBY_VERSION=3.3.7 \
              --build-arg NODE_VERSION=24.13.0 \
              .
      - run:
          name: Save Docker image
          command: |
            mkdir -p /tmp/docker-images
            docker save -o /tmp/docker-images/control.tar demo-ecommerce:control-${CIRCLE_SHA1}
      - persist_to_workspace:
          root: /tmp
          paths:
            - docker-images/control.tar

  perf-tests:
    executor: machine-executor
    steps:
      - checkout
      - node/install:
          node-version: '24.13.0'
      - run:
          name: Enable corepack for Yarn
          command: corepack enable && corepack install
      - node/install-packages:
          pkg-manager: yarn
      - run:
          name: Build shaka-twin-servers package
          command: yarn build
      - attach_workspace:
          at: /tmp/workspace
      - run:
          name: Install dockerize
          command: |
            curl -sSL https://github.com/jwilder/dockerize/releases/download/v0.6.1/dockerize-linux-amd64-v0.6.1.tar.gz | sudo tar -xz -C /usr/local/bin
      - run:
          name: Load and tag Docker images
          command: |
            docker load -i /tmp/workspace/docker-images/experiment.tar
            docker load -i /tmp/workspace/docker-images/control.tar
            docker tag demo-ecommerce:experiment-${CIRCLE_SHA1} demo-ecommerce:experiment
            docker tag demo-ecommerce:control-${CIRCLE_SHA1} demo-ecommerce:control
      - run:
          name: Set environment variables for docker-compose
          command: |
            echo "export CI_IMAGE_NAME=demo-ecommerce:experiment" >> $BASH_ENV
            echo "export CI_CONTROL_IMAGE_NAME=demo-ecommerce:control" >> $BASH_ENV
            echo "export RAILS_MASTER_KEY=dummy_key_for_ci" >> $BASH_ENV
            echo "export USER=$(whoami)" >> $BASH_ENV
            source $BASH_ENV
      - run:
          name: Start containers
          command: |
            cd demo-ecommerce
            yarn shaka-twin-servers start-containers -c twin-servers.config.ci.ts
      - run:
          name: Wait for servers
          command: |
            dockerize -wait http://localhost:3020/up -timeout 120s
            dockerize -wait http://localhost:3030/up -timeout 120s
      - run:
          name: Run performance tests
          command: |
            cd demo-ecommerce
            yarn shaka-twin-servers run-cmd-parallel -c twin-servers.config.ci.ts "bundle exec rake perf:benchmark"
      - store_artifacts:
          path: demo-ecommerce/perf-results
          destination: perf-results

workflows:
  build-and-check:
    jobs:
      - build-bundles

      # Feature branches: download and compare
      - bundle-size-check:
          requires:
            - build-bundles
          filters:
            branches:
              ignore:
                - main

      # Main branch: upload new baseline
      - bundle-size-upload:
          requires:
            - build-bundles
          filters:
            branches:
              only:
                - main

  # Performance testing workflow with twin servers for A/B testing
  perf-test-twin-servers:
    jobs:
      - approve-perf-tests:
          type: approval
          filters:
            branches:
              ignore: main

      # Build images in parallel after approval
      - build-experiment-image:
          requires:
            - approve-perf-tests
          filters:
            branches:
              ignore: main

      - build-control-image:
          requires:
            - approve-perf-tests
          filters:
            branches:
              ignore: main

      # Run perf tests after both images are built
      - perf-tests:
          requires:
            - build-experiment-image
            - build-control-image
          filters:
            branches:
              ignore: main
