version: 2.1

orbs:
  node: circleci/node@7.2.1

executors:
  node-executor:
    docker:
      - image: cimg/node:20.18
    working_directory: ~/project

jobs:
  build-bundles:
    executor: node-executor
    resource_class: large
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: yarn
      - run:
          name: Build consumer and admin bundles
          command: |
            cd demo-ecommerce
            yarn build:prod:all:stats
      - persist_to_workspace:
          root: .
          paths:
            - demo-ecommerce/public/packs

  bundle-size-check:
    executor: node-executor
    steps:
      - checkout
      - attach_workspace:
          at: .
      - node/install-packages:
          pkg-manager: yarn
      - restore_cache:
          keys:
            - bundle-size-baseline-main-
      - run:
          name: Download baseline
          command: |
            cd demo-ecommerce
            yarn bundle-size:download || echo "No baseline found, skipping comparison"
      - run:
          name: Compare bundle sizes
          command: |
            cd demo-ecommerce
            if [ -d "tmp/bundle_size" ]; then
              yarn bundle-size:compare
            else
              echo "No baseline to compare against, passing check"
            fi
      - store_artifacts:
          path: demo-ecommerce/bundle-size-diffs
          destination: bundle-size-diffs

  bundle-size-upload:
    executor: node-executor
    steps:
      - checkout
      - attach_workspace:
          at: .
      - node/install-packages:
          pkg-manager: yarn
      - restore_cache:
          keys:
            - bundle-size-baseline-main-
      - run:
          name: Upload bundle size baseline
          command: |
            cd demo-ecommerce
            yarn bundle-size:upload
      - save_cache:
          key: bundle-size-baseline-main-{{ .Revision }}
          paths:
            - demo-ecommerce/baseline/bundle_size

workflows:
  build-and-check:
    jobs:
      - build-bundles

      # Feature branches: download and compare
      - bundle-size-check:
          requires:
            - build-bundles
          filters:
            branches:
              ignore:
                - main

      # Main branch: upload new baseline
      - bundle-size-upload:
          requires:
            - build-bundles
          filters:
            branches:
              only:
                - main
