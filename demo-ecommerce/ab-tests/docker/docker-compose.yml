  MGXCOPY_SMTP_ADDRESS: ${MGXCOPY_SMTP_ADDRESS}
  MGXCOPY_SMTP_DOMAIN: ${MGXCOPY_SMTP_DOMAIN}
  MGXCOPY_SMTP_USERNAME: ${MGXCOPY_SMTP_USERNAME}
  MGXCOPY_SMTP_PASSWORD: ${MGXCOPY_SMTP_PASSWORD}
  
  # Zendesk
  PRINTIVITY_ZENDESK_API_URL: ${PRINTIVITY_ZENDESK_API_URL}
  PRINTIVITY_ZENDESK_API_USERNAME: ${PRINTIVITY_ZENDESK_API_USERNAME}
  PRINTIVITY_ZENDESK_API_TOKEN: ${PRINTIVITY_ZENDESK_API_TOKEN}
  
  # Mailchimp (Gibbon)
  MGXCOPY_GIBBON_API_KEY: ${MGXCOPY_GIBBON_API_KEY}
  
  # Twilio
  MGXCOPY_TWILIO_SID: ${MGXCOPY_TWILIO_SID}
  MGXCOPY_TWILIO_AUTH_TOKEN: ${MGXCOPY_TWILIO_AUTH_TOKEN}
  MGXCOPY_TWILIO_PHONE: ${MGXCOPY_TWILIO_PHONE}
  
  # Application Context
  APP_CONTEXT_DISABLE_CACHE: ${APP_CONTEXT_DISABLE_CACHE}
  
  # Klaviyo
  PRINTIVITY_KLAVIYO_DEFAULT_LIST_ID: ${PRINTIVITY_KLAVIYO_DEFAULT_LIST_ID}
  PRINTIVITY_KLAVIYO_SUBSCRIBE_LIST_ID: ${PRINTIVITY_KLAVIYO_SUBSCRIBE_LIST_ID}
  
  # TaxJar
  TAXJAR_API_KEY: ${TAXJAR_API_KEY}
  TAXJAR_API_URL: ${TAXJAR_API_URL}
  
  # Version Information
  SOLIDUS_BRANCH: ${SOLIDUS_BRANCH}
  RAILS_VERSION: ${RAILS_VERSION}
  
  # QZ Print
  QZ_PRINT_PKEY: ${QZ_PRINT_PKEY}
  QZ_PRINT_CERT: ${QZ_PRINT_CERT}
  
  # Smarty
  SMARTY_CLIENT_KEY: ${SMARTY_CLIENT_KEY}
  SMARTY_AUTH_ID: ${SMARTY_AUTH_ID}
  SMARTY_AUTH_TOKEN: ${SMARTY_AUTH_TOKEN}
  
  # GitHub App
  INSTALLATION_ID: ${INSTALLATION_ID}
  GITHUB_APP_ID: ${GITHUB_APP_ID}
  REPOSITORY: ${REPOSITORY}
  GH_APP_PKEY: ${GH_APP_PKEY}
  
  # Pub/Sub
  PRINTIVITY_PUB_SUB_CLIENT: ${PRINTIVITY_PUB_SUB_CLIENT}
  
  RACK_TIMEOUT_SERVICE_TIMEOUT: 3600

volumes:
  printivity_control:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ~/printivity_control_docker_volume
  printivity_experiment:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ~/printivity_experiment_docker_volume

services:
  mysql-control: &mysql
    image: mysql:8.0
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: printivity_development
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  mysql-experiment:
    <<: *mysql

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  control-server:
    image: ${CI_CONTROL_IMAGE_NAME}
    ports:
      - "3020:3000"
    environment:
      <<: *server-env
      PERF_EXPERIMENT: "false"
      PORT: "3000"
      DATABASE_URL: "mysql2://root@mysql-control:3306/printivity_development"
    depends_on:
      mysql-control:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - printivity_control:/home/${USER}/app
    command: sleep infinity

  experiment-server:
    image: ${CI_IMAGE_NAME}
    ports:
      - "3030:3000"
    environment:
      <<: *server-env
      PERF_EXPERIMENT: "true"
      PORT: "3000"
      DATABASE_URL: "mysql2://root@mysql-experiment:3306/printivity_development"
    depends_on:
      mysql-experiment:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes: 
      - printivity_experiment:/home/${USER}/app
    command: sleep infinity

