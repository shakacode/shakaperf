# Docker Compose for twin-servers A/B testing of demo-ecommerce
#
# See packages/shaka-twin-servers/README.md

# YAML anchor for shared environment variables
x-server-env: &server-env
  RAILS_ENV: production
  SECRET_KEY_BASE: demo-ecommerce-not-a-real-secret-just-for-perf-testing
  RAILS_LOG_TO_STDOUT: "true"
  RAILS_SERVE_STATIC_FILES: "true"
  DISABLE_SSL: "true"

services:
  control-server:
    image: ${CONTROL_IMAGE_NAME}
    ports:
      - "3020:3000"
    environment:
      <<: *server-env
      PERF_EXPERIMENT: "false"
      DATABASE_PATH: /home/${USER}/app/storage/control_production.sqlite3
    volumes:
      - demo_ecommerce_control:/home/${USER}/app
    command: sleep infinity
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  experiment-server:
    image: ${EXPERIMENT_IMAGE_NAME}
    ports:
      - "3030:3000"
    environment:
      <<: *server-env
      PERF_EXPERIMENT: "true"
      DATABASE_PATH: /home/${USER}/app/storage/experiment_production.sqlite3
    volumes:
      - demo_ecommerce_experiment:/home/${USER}/app
    command: sleep infinity
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  demo_ecommerce_control:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ~/demo_ecommerce_control_docker_volume
  demo_ecommerce_experiment:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ~/demo_ecommerce_experiment_docker_volume
