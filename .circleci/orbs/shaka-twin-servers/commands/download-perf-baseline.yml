description: |
  Download the perf test baseline commit SHA from S3 and set PERF_BASELINE_SHA
  in $BASH_ENV. The checkout-control command will use this SHA to determine
  which commit to build the control image from.

  Expects environment variables:
    S3_BUCKET              - S3 bucket name (required)
    S3_ENDPOINT            - Custom S3 endpoint for R2, MinIO, etc. (optional)
    AWS_ACCESS_KEY_ID      - AWS credentials (required)
    AWS_SECRET_ACCESS_KEY  - AWS credentials (required)

  Falls back to HEAD~1 if the baseline is not found, has an invalid format,
  or refers to a commit not in the current git history.

parameters:
  s3-key-prefix:
    type: string
    default: 'perf-tests-baseline-shas'
    description: 'S3 key prefix. The full key will be <prefix>/git-sha.txt'

steps:
  - run:
      name: Download perf test baseline SHA from S3
      command: |
        set -euo pipefail

        if [ -z "${S3_BUCKET:-}" ]; then
          echo "Error: S3_BUCKET environment variable is required"
          exit 1
        fi

        S3_KEY="<< parameters.s3-key-prefix >>/git-sha.txt"
        S3_URI="s3://${S3_BUCKET}/${S3_KEY}"

        aws_cmd() {
          if [ -n "${S3_ENDPOINT:-}" ]; then
            aws s3 --endpoint-url "$S3_ENDPOINT" "$@"
          else
            aws s3 "$@"
          fi
        }

        tmp_file=$(mktemp)

        echo "Downloading perf test baseline from ${S3_URI}..."

        if aws_cmd cp "$S3_URI" "$tmp_file" 2>/dev/null; then
          sha=$(tr -d '[:space:]' < "$tmp_file")
          rm -f "$tmp_file"

          # Validate it looks like a SHA
          if ! echo "$sha" | grep -qE '^[0-9a-f]{40}$'; then
            echo "Warning: Invalid baseline SHA format: '$sha'"
            echo "Falling back to HEAD~1"
            sha=$(git rev-parse HEAD~1)
          fi

          # Validate the commit exists in the repo
          if ! git cat-file -t "$sha" >/dev/null 2>&1; then
            echo "Warning: Baseline commit $sha not found in git history"
            echo "Falling back to HEAD~1"
            sha=$(git rev-parse HEAD~1)
          fi

          echo "Perf test baseline SHA: ${sha:0:7} ($sha)"
          echo "export PERF_BASELINE_SHA=$sha" >> "$BASH_ENV"
        else
          rm -f "$tmp_file"
          echo "Warning: No perf test baseline found in S3. This appears to be the first run."
          echo "Falling back to HEAD~1 as initial baseline."
          sha=$(git rev-parse HEAD~1)
          echo "Using fallback baseline SHA: ${sha:0:7} ($sha)"
          echo "export PERF_BASELINE_SHA=$sha" >> "$BASH_ENV"
        fi
