description: |
  Scheduled A/B performance + visual-regression workflow that runs on a cron
  schedule (e.g. nightly). Uses an S3-stored control commit SHA as the control
  point instead of git merge-base.

  When tests pass, the control automatically advances to the current HEAD.
  When tests fail, you can click the "approve-control-update" approval job in
  CircleCI to acknowledge the regression and advance the control anyway.

  Requires `abtests.config.ts` in the project root.

  ## CircleCI Setup

  To trigger this workflow on a schedule, you need to create a Scheduled Trigger
  in the CircleCI UI:

  1. Go to your project in **CircleCI** (app.circleci.com)
  2. Navigate to **Project Settings** (gear icon)
  3. Click **Project Setup** in the left sidebar
  4. Click **Schedule +**
  5. Fill in:
     - **Name**: e.g. "Nightly Twin Server Tests"
     - **Branch**: `main`
     - **Schedule**: set your desired cron expression (e.g. `0 0 * * *` for midnight UTC)
     - **Pipeline Parameters**: add `run-scheduled-perf-tests` with value `true`
  6. Save

  ## Required Environment Variables

  Set these in your CircleCI project settings under **Environment Variables**:

    - AWS_ACCESS_KEY_ID - AWS credentials for S3 access
    - AWS_SECRET_ACCESS_KEY - AWS credentials for S3 access
    - S3_BUCKET - S3 bucket name (can also be set inline in setup-steps)
    - S3_ENDPOINT - Custom S3 endpoint for R2, MinIO, etc. (optional)

usage:
  version: 2.1

  parameters:
    run-scheduled-perf-tests:
      type: boolean
      default: false

  orbs:
    shaka-perf: shakacode/shaka-perf@1.0.0

  workflows:
    # Guard your normal workflows so they don't run on scheduled triggers
    build-and-test:
      when:
        not: << pipeline.parameters.run-scheduled-perf-tests >>
      jobs:
        - build
        - test

    # Scheduled workflow: only runs when triggered with run-scheduled-perf-tests=true
    scheduled-perf-tests:
      when: << pipeline.parameters.run-scheduled-perf-tests >>
      jobs:
        - shaka-perf/build-experiment:
            image-name: my-app
            working-directory: my-app
            setup-steps:
              - run:
                  name: Install dependencies
                  command: npm install

        - shaka-perf/build-control:
            image-name: my-app
            working-directory: my-app
            setup-steps:
              - run:
                  name: Install dependencies
                  command: npm install
              - run:
                  name: Set S3 environment variables
                  command: |
                    echo 'export S3_BUCKET=my-perf-control-bucket' >> "$BASH_ENV"
              - shaka-perf/download-control-commit-sha

        - shaka-perf/run-tests:
            name: scheduled-perf-tests
            requires:
              - shaka-perf/build-experiment
              - shaka-perf/build-control
            working-directory: my-app
            server-command: 'npm start'
            post-steps:
              - run:
                  name: Run shaka-perf compare
                  command: |
                    cd my-app
                    npx shaka-perf compare
              - store_artifacts:
                  path: my-app/compare-results
                  destination: shaka-perf-compare-report

        # Auto-advance control when all tests pass
        - shaka-perf/update-control-commit-sha:
            requires:
              - scheduled-perf-tests

        # Manual approval path: acknowledge a regression and advance control anyway
        - approve-control-update:
            type: approval
            requires:
              - shaka-perf/build-experiment
              - shaka-perf/build-control

        - shaka-perf/update-control-commit-sha:
            name: force-update-control
            requires:
              - approve-control-update
