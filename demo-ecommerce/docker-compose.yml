# Docker Compose for twin-servers A/B testing of demo-ecommerce
#
# Usage:
#   cd demo-ecommerce
#   export RAILS_MASTER_KEY=$(cat config/master.key)
#   export CI_IMAGE_NAME=demo-ecommerce:experiment
#   export CI_CONTROL_IMAGE_NAME=demo-ecommerce:control
#   docker compose up
#
# The control server will be at http://localhost:3020
# The experiment server will be at http://localhost:3030

# YAML anchor for shared environment variables
x-server-env: &server-env
  RAILS_ENV: production
  RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
  RAILS_LOG_TO_STDOUT: "true"
  RAILS_SERVE_STATIC_FILES: "true"
  DISABLE_SSL: "true"

services:
  control-server:
    image: ${CI_CONTROL_IMAGE_NAME}
    ports:
      - "3020:3000"
    environment:
      <<: *server-env
      PERF_EXPERIMENT: "false"
      DATABASE_PATH: /home/${USER}/app/storage/control_production.sqlite3
    volumes:
      - demo_ecommerce_control:/home/${USER}/app
    command: sleep infinity
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  experiment-server:
    image: ${CI_IMAGE_NAME}
    ports:
      - "3030:3000"
    environment:
      <<: *server-env
      PERF_EXPERIMENT: "true"
      DATABASE_PATH: /home/${USER}/app/storage/experiment_production.sqlite3
    volumes:
      - demo_ecommerce_experiment:/home/${USER}/app
    command: sleep infinity
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  demo_ecommerce_control:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ~/demo_ecommerce_control_docker_volume
  demo_ecommerce_experiment:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ~/demo_ecommerce_experiment_docker_volume
