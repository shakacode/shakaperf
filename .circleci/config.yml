version: 2.1

parameters:
  run-scheduled-perf-tests:
    type: boolean
    default: false

orbs:
  node: circleci/node@7.2.1
  ruby: circleci/ruby@2.6.0
  shaka-perf: ramez/shaka-perf@1.0.2

executors:
  ruby-node-executor:
    docker:
      - image: cimg/ruby:3.3-node
    working_directory: ~/project

commands:
  setup-yarn:
    description: Install Node packages with Yarn
    steps:
      - node/install-packages:
          pkg-manager: yarn

  setup-yarn-and-build-packages:
    description: Install Node packages with Yarn and build all packages
    steps:
      - setup-yarn
      - run:
          name: Build packages
          command: yarn build

  enable-corepack:
    steps:
      - run:
          name: Enable Corepack for Yarn
          command: corepack enable && corepack install

  install-playwright:
    description: Install Playwright Chromium browser with caching
    steps:
      - restore_cache:
          keys:
            - playwright-v1-{{ arch }}-{{ checksum "yarn.lock" }}
            - playwright-v1-{{ arch }}-
      - run:
          name: Install Playwright Chromium
          command: |
            DEBIAN_FRONTEND=noninteractive yarn playwright install chromium --with-deps
      - save_cache:
          key: playwright-v1-{{ arch }}-{{ checksum "yarn.lock" }}
          paths:
            - ~/.cache/ms-playwright

jobs:
  jest-tests:
    executor: ruby-node-executor
    steps:
      - checkout
      - setup-yarn-and-build-packages
      - run:
          name: Run shaka-bundle-size tests
          command: |
            yarn workspace shaka-bundle-size test --reporters=default --reporters=jest-junit
      - run:
          name: Run shaka-perf tests
          command: |
            yarn workspace shaka-perf test --reporters=default --reporters=jest-junit
      - store_test_results:
          path: packages/shaka-bundle-size/junit.xml
      - store_test_results:
          path: packages/shaka-perf/junit.xml

  build-bundles:
    executor: ruby-node-executor
    resource_class: large
    steps:
      - checkout
      - ruby/install-deps:
          app-dir: demo-ecommerce
      - setup-yarn
      - run:
          name: Build consumer and admin bundles
          command: |
            cd demo-ecommerce
            yarn build:prod:all:stats
      - persist_to_workspace:
          root: .
          paths:
            - demo-ecommerce/public/packs

  bundle-size-check:
    executor: ruby-node-executor
    steps:
      - checkout
      - attach_workspace:
          at: .
      - setup-yarn-and-build-packages
      - run:
          name: Download baseline
          command: |
            cd demo-ecommerce
            yarn bundle-size:download || echo "No baseline found, skipping comparison"
      - run:
          name: Generate current bundle stats
          command: |
            cd demo-ecommerce
            yarn bundle-size:generate
      - run:
          name: Compare bundle sizes
          command: |
            cd demo-ecommerce
            if [ -d "tmp/bundle_size" ]; then
              yarn bundle-size:compare
            else
              echo "No baseline to compare against, passing check"
            fi
      - store_artifacts:
          path: demo-ecommerce/bundle-size-diffs
          destination: bundle-size-diffs

  bundle-size-upload:
    executor: ruby-node-executor
    steps:
      - checkout
      - attach_workspace:
          at: .
      - setup-yarn-and-build-packages
      - run:
          name: Generate current bundle stats
          command: |
            cd demo-ecommerce
            yarn bundle-size:generate
      - run:
          name: Upload bundle size baseline
          command: |
            cd demo-ecommerce
            yarn bundle-size:upload

workflows:
  build-and-check:
    when:
      not: << pipeline.parameters.run-scheduled-perf-tests >>
    jobs:
      - jest-tests
      - build-bundles

      # Feature branches: download and compare
      - bundle-size-check:
          requires:
            - build-bundles
          filters:
            branches:
              ignore:
                - main

      # Main branch: upload new baseline
      - bundle-size-upload:
          requires:
            - build-bundles
          filters:
            branches:
              only:
                - main

  # Scheduled A/B perf tests on main branch (triggered via CircleCI scheduled pipeline)
  # NOTE: Defined before twin-server-tests so YAML anchors can be referenced below
  scheduled-perf-tests:
    when: << pipeline.parameters.run-scheduled-perf-tests >>
    jobs:
      - shaka-perf/build-experiment: &build-experiment-job
          image-name: demo-ecommerce
          resource-class: medium
          working-directory: demo-ecommerce
          cli-prefix: yarn
          setup-steps:
            - enable-corepack
            - setup-yarn-and-build-packages

      - shaka-perf/build-control: &build-control-job
          image-name: demo-ecommerce
          resource-class: medium
          working-directory: demo-ecommerce
          cli-prefix: yarn
          project-subdir: demo-ecommerce
          setup-steps:
            - enable-corepack
            - setup-yarn-and-build-packages
            - run:
                name: Set S3 environment variables
                command: |
                  echo 'export S3_BUCKET=shaka-perf-demo-storage' >> "$BASH_ENV" # Either define here or in CircleCI Env
                  echo "export S3_ENDPOINT='${PERF_BASELINE_S3_ENDPOINT}'" >> "$BASH_ENV" # If the CI variable has a different name, you can override it here
                  echo "export AWS_ACCESS_KEY_ID='${AWS_ACCESS_KEY_ID}'" >> "$BASH_ENV" # Job expects these variables to be set
                  echo "export AWS_SECRET_ACCESS_KEY='${AWS_SECRET_ACCESS_KEY}'" >> "$BASH_ENV" # We can set it here or in CircleCI Env
            - shaka-perf/download-control-commit-sha

      - shaka-perf/run-tests: &compare-tests-job
          name: scheduled-compare-tests
          requires:
            - shaka-perf/build-experiment
            - shaka-perf/build-control
          resource-class: medium
          working-directory: demo-ecommerce
          cli-prefix: yarn
          setup-steps:
            - enable-corepack
            - setup-yarn-and-build-packages
          server-command: 'bundle exec puma -C config/puma.rb -b tcp://0.0.0.0:3000'
          post-steps:
            - install-playwright
            - run:
                name: Run shaka-perf compare
                command: |
                  cd demo-ecommerce
                  yarn compare
            # `compare` exits non-zero on any perf regression, visual
            # mismatch, or engine error — upload the unified report and
            # per-test artifacts anyway so we can inspect what happened.
            - store_artifacts:
                path: demo-ecommerce/compare-results
                destination: shaka-perf-compare-report
                when: always

      # Update control commit SHA (only runs when all tests pass)
      - shaka-perf/update-control-commit-sha: &update-control-sha-job
          pre-steps:
            - run:
                name: Set S3 environment variables
                command: |
                  echo 'export S3_BUCKET=shaka-perf-demo-storage' >> "$BASH_ENV" # Either define here or in CircleCI Env
                  echo "export S3_ENDPOINT='${PERF_BASELINE_S3_ENDPOINT}'" >> "$BASH_ENV" # If the CI variable has a different name, you can override it here
                  echo "export AWS_ACCESS_KEY_ID='${AWS_ACCESS_KEY_ID}'" >> "$BASH_ENV" # Job expects these variables to be set
                  echo "export AWS_SECRET_ACCESS_KEY='${AWS_SECRET_ACCESS_KEY}'" >> "$BASH_ENV" # We can set it here or in CircleCI Env
          requires:
            - scheduled-compare-tests

      # Approval path: if tests fail, approve to update control commit SHA anyway
      - approve-baseline-update:
          type: approval
          requires:
            - shaka-perf/build-experiment
            - shaka-perf/build-control

      - shaka-perf/update-control-commit-sha:
          <<: *update-control-sha-job
          name: force-update-perf-baseline
          requires:
            - approve-baseline-update

  # Performance, Visual Regression testing workflow with twin servers for A/B testing
  twin-server-tests:
    when:
      not: << pipeline.parameters.run-scheduled-perf-tests >>
    jobs:
      - shaka-perf/build-experiment:
          <<: *build-experiment-job
          filters:
            branches:
              ignore: main

      - shaka-perf/build-control:
          <<: *build-control-job
          setup-steps:
            - enable-corepack
            - setup-yarn-and-build-packages
          filters:
            branches:
              ignore: main

      - shaka-perf/run-tests:
          <<: *compare-tests-job
          name: compare-tests
          filters:
            branches:
              ignore: main
