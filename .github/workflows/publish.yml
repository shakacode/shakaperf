name: Publish Package

on:
  push:
    tags:
      - '*@*' # Matches: package-name@version

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Extract package info from tag
        id: package
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          PACKAGE_NAME=${TAG%@*}
          VERSION=${TAG#*@}
          echo "name=$PACKAGE_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing $PACKAGE_NAME version $VERSION"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build package
        run: yarn workspace ${{ steps.package.outputs.name }} run build

      - name: Publish package
        run: yarn workspace ${{ steps.package.outputs.name }} npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
