description: |
  Build the experiment Docker image from the current branch.

executor:
  name: machine
  resource-class: << parameters.resource-class >>

parameters:
  resource-class:
    type: enum
    enum: ['medium', 'large', 'xlarge', '2xlarge', '2xlarge+']
    default: 'large'
    description: 'Machine resource class'
  working-directory:
    type: string
    default: '.'
    description: 'Directory containing abtests.config.ts'
  image-name:
    type: string
    description: 'Docker image name (e.g., my-app)'
  config-path:
    type: string
    default: ''
    description: 'Custom config file path'
  verbose:
    type: boolean
    default: false
    description: 'Enable verbose output'
  cli-prefix:
    type: string
    default: 'npx'
    description: 'Command prefix to invoke shaka-perf (e.g., npx, yarn, pnpm)'
  setup-steps:
    type: steps
    default: []
    description: 'Steps to run before build (use this for package manager setup)'
steps:
  - checkout
  - setup-node
  - steps: << parameters.setup-steps >>
  - build-image:
      target: experiment
      working-directory: << parameters.working-directory >>
      config-path: << parameters.config-path >>
      verbose: << parameters.verbose >>
      cli-prefix: << parameters.cli-prefix >>
  - save-image:
      image-name: << parameters.image-name >>
      target: experiment
