description: |
  Checkout the control commit using git worktree for control image build.
  Sets CONTROL_REPO_DIR environment variable.
  By default uses merge-base with the default branch. If PERF_BASELINE_SHA
  environment variable is set (e.g., via a prior setup step), uses that
  commit SHA instead.

parameters:
  control-dir:
    type: string
    default: '/home/circleci/control_checkout'
    description: 'Directory for control checkout'
  project-subdir:
    type: string
    default: ''
    description: 'Subdirectory within repo containing the project'
  working-directory:
    type: string
    default: '.'
    description: 'Directory containing twin-servers.config.ts'
  cli-prefix:
    type: string
    default: 'npx'
    description: 'Command prefix to invoke shaka-perf (e.g., npx, yarn, pnpm)'

steps:
  - run:
      name: Copy Dockerfile to temp location
      working_directory: << parameters.working-directory >>
      command: |
        DOCKERFILE=$(<< parameters.cli-prefix >> shaka-perf twin-servers get-config dockerfile)
        DOCKERFILE_NAME=$(basename "$DOCKERFILE")
        echo "Dockerfile from config: $DOCKERFILE (basename: $DOCKERFILE_NAME)"
        mkdir -p /tmp/docker-build
        # Copy from current working directory (working-directory already handles project location)
        cp "$DOCKERFILE" /tmp/docker-build/
        # Store dockerfile basename for later steps
        echo "$DOCKERFILE_NAME" > /tmp/docker-build/.dockerfile-name
  - run:
      name: Checkout control commit
      command: |
        if [ -n "$PERF_BASELINE_SHA" ]; then
          CONTROL_SHA="$PERF_BASELINE_SHA"
          echo "Using baseline SHA from environment: $CONTROL_SHA"
        else
          BASE_BRANCH=$(git rev-parse --abbrev-ref origin/HEAD 2>/dev/null || echo "origin/main")
          echo "Detected base branch: $BASE_BRANCH"
          CONTROL_SHA=$(git merge-base HEAD "$BASE_BRANCH")
          echo "Using merge-base commit: $CONTROL_SHA"
        fi
        mkdir -p "<< parameters.control-dir >>"
        git worktree add "<< parameters.control-dir >>" "$CONTROL_SHA"
  - run:
      name: Restore Dockerfile to control checkout
      command: |
        DOCKERFILE=$(cat /tmp/docker-build/.dockerfile-name)
        if [ -n "<< parameters.project-subdir >>" ]; then
          cp "/tmp/docker-build/$DOCKERFILE" "<< parameters.control-dir >>/<< parameters.project-subdir >>/"
        else
          cp "/tmp/docker-build/$DOCKERFILE" "<< parameters.control-dir >>/"
        fi
  - run:
      name: Set CONTROL_REPO_DIR environment variable
      command: |
        if [ -n "<< parameters.project-subdir >>" ]; then
          echo "export CONTROL_REPO_DIR=<< parameters.control-dir >>/<< parameters.project-subdir >>" >> "$BASH_ENV"
        else
          echo "export CONTROL_REPO_DIR=<< parameters.control-dir >>" >> "$BASH_ENV"
        fi
