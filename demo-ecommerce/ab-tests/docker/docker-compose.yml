  MGXCOPY_RAILS_SECRET_KEY: ${MGXCOPY_RAILS_SECRET_KEY}
  RAILS_SERVE_STATIC_FILES: ${RAILS_SERVE_STATIC_FILES}
  PRINTIVITY_SITE_CODE: ${PRINTIVITY_SITE_CODE}
  HOTJAR_SITE_ID: ${HOTJAR_SITE_ID}
  
  # Persephone DB Configuration
  MGXCOPY_PERSEPHONE_DB_ENDPOINT: ${MGXCOPY_PERSEPHONE_DB_ENDPOINT}
  MGXCOPY_PERSEPHONE_SECRET_KEY: ${MGXCOPY_PERSEPHONE_SECRET_KEY}
  MGXCOPY_PERSEPHONE_DB_DBNAME: ${MGXCOPY_PERSEPHONE_DB_DBNAME}
  MGXCOPY_PERSEPHONE_DB_USERNAME: ${MGXCOPY_PERSEPHONE_DB_USERNAME}
  MGXCOPY_PERSEPHONE_DB_PASSWORD: ${MGXCOPY_PERSEPHONE_DB_PASSWORD}
  
  # Color codes
