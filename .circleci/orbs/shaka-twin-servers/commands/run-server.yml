description: |
  Start a server in a container (typically as a background process).

parameters:
  target:
    type: enum
    enum: ["control", "experiment"]
    description: "Target container"
  command:
    type: string
    description: "Server start command"
  working-directory:
    type: string
    default: "."
    description: "Directory containing twin-servers.config.ts"
  background:
    type: boolean
    default: true
    description: "Run in background"
  cli-prefix:
    type: string
    default: "npx"
    description: "Command prefix to invoke shaka-twin-servers (e.g., npx, yarn, pnpm)"

steps:
  - run:
      name: Start << parameters.target >> server
      working_directory: << parameters.working-directory >>
      command: |
        << parameters.cli-prefix >> shaka-twin-servers run-cmd << parameters.target >> "<< parameters.command >>"
      background: << parameters.background >>
