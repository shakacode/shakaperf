description: |
  Save a Docker image to the workspace for sharing between jobs.

parameters:
  image-name:
    type: string
    description: "Docker image name (without tag)"
  target:
    type: enum
    enum: ["control", "experiment"]
    description: "Image target/tag"
  workspace-path:
    type: string
    default: "/tmp/docker-images"
    description: "Directory to save images"

steps:
  - run:
      name: Save << parameters.target >> Docker image
      command: |
        mkdir -p "<< parameters.workspace-path >>"
        docker save -o "<< parameters.workspace-path >>/<< parameters.target >>.tar" "<< parameters.image-name >>:<< parameters.target >>"
  - persist_to_workspace:
      root: /tmp
      paths:
        - docker-images/<< parameters.target >>.tar
