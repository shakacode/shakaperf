version: 2.1

orbs:
  node: circleci/node@7.2.1
  ruby: circleci/ruby@2.6.0

executors:
  ruby-node-executor:
    docker:
      - image: cimg/ruby:3.3-node
    working_directory: ~/project

  machine-executor:
    machine:
      image: ubuntu-2204:2023.10.1
    resource_class: large

commands:
  setup-yarn:
    description: Install Node packages with Yarn
    steps:
      - node/install-packages:
          pkg-manager: yarn

  setup-yarn-and-build:
    description: Install Node packages with Yarn and build all packages
    steps:
      - setup-yarn
      - run:
          name: Build packages
          command: yarn build

  setup-machine-node:
    description: Setup Node.js with corepack and Yarn on machine executor
    steps:
      - node/install
      - run:
          name: Enable corepack for Yarn
          command: corepack enable && corepack install
      - setup-yarn-and-build

  install-playwright:
    description: Install Playwright Chromium browser with caching
    steps:
      - restore_cache:
          keys:
            - playwright-v1-{{ arch }}-{{ checksum "yarn.lock" }}
            - playwright-v1-{{ arch }}-
      - run:
          name: Install Playwright Chromium
          command: |
            cd demo-ecommerce
            DEBIAN_FRONTEND=noninteractive npx playwright install chromium --with-deps
      - save_cache:
          key: playwright-v1-{{ arch }}-{{ checksum "yarn.lock" }}
          paths:
            - ~/.cache/ms-playwright

  save-docker-image:
    description: Save a Docker image to workspace
    parameters:
      image-name:
        type: string
      target:
        type: string
    steps:
      - run:
          name: Save Docker image
          command: |
            mkdir -p /tmp/docker-images
            docker save -o /tmp/docker-images/<< parameters.target >>.tar << parameters.image-name >>:<< parameters.target >>
      - persist_to_workspace:
          root: /tmp
          paths:
            - docker-images/<< parameters.target >>.tar

jobs:
  test:
    executor: ruby-node-executor
    steps:
      - checkout
      - setup-yarn-and-build
      - run:
          name: Run shaka-bundle-size tests
          command: yarn workspace shaka-bundle-size test
      - run:
          name: Run shaka-twin-servers tests
          command: yarn workspace shaka-twin-servers test

  build-bundles:
    executor: ruby-node-executor
    resource_class: large
    steps:
      - checkout
      - ruby/install-deps:
          app-dir: demo-ecommerce
      - setup-yarn
      - run:
          name: Build consumer and admin bundles
          command: |
            cd demo-ecommerce
            yarn build:prod:all:stats
      - persist_to_workspace:
          root: .
          paths:
            - demo-ecommerce/public/packs

  bundle-size-check:
    executor: ruby-node-executor
    steps:
      - checkout
      - attach_workspace:
          at: .
      - setup-yarn-and-build
      - run:
          name: Download baseline
          command: |
            cd demo-ecommerce
            yarn bundle-size:download || echo "No baseline found, skipping comparison"
      - run:
          name: Compare bundle sizes
          command: |
            cd demo-ecommerce
            if [ -d "tmp/bundle_size" ]; then
              yarn bundle-size:compare
            else
              echo "No baseline to compare against, passing check"
            fi
      - store_artifacts:
          path: demo-ecommerce/bundle-size-diffs
          destination: bundle-size-diffs

  bundle-size-upload:
    executor: ruby-node-executor
    steps:
      - checkout
      - attach_workspace:
          at: .
      - setup-yarn-and-build
      - run:
          name: Upload bundle size baseline
          command: |
            cd demo-ecommerce
            yarn bundle-size:upload

  # Performance testing jobs for A/B testing with twin servers
  build-experiment-image:
    executor: machine-executor
    steps:
      - checkout
      - setup-machine-node
      - run:
          name: Build experiment Docker image
          command: |
            cd demo-ecommerce
            yarn shaka-twin-servers build --target experiment
      - save-docker-image:
          image-name: demo-ecommerce
          target: experiment

  build-control-image:
    executor: machine-executor
    environment:
      CONTROL_REPO_DIR: /home/circleci/control_checkout/demo-ecommerce
    steps:
      - checkout
      - setup-machine-node
      - run:
          name: Copy Dockerfile to temp location
          command: |
            mkdir -p /tmp/docker-build
            cp demo-ecommerce/Dockerfile.production /tmp/docker-build/
      - run:
          name: Checkout control (merge-base with main)
          command: |
            MERGE_BASE=$(git merge-base HEAD origin/main)
            mkdir -p /home/circleci/control_checkout
            git worktree add /home/circleci/control_checkout $MERGE_BASE
      - run:
          name: Build control Docker image
          command: |
            # Copy the Dockerfile from current branch into the control checkout
            cp /tmp/docker-build/Dockerfile.production $CONTROL_REPO_DIR/
            cd demo-ecommerce
            yarn shaka-twin-servers build --target control
      - save-docker-image:
          image-name: demo-ecommerce
          target: control

  perf-tests:
    executor: machine-executor
    steps:
      - checkout
      - setup-machine-node
      - attach_workspace:
          at: /tmp/workspace
      - run:
          name: Install dockerize
          command: |
            curl -sSL https://github.com/jwilder/dockerize/releases/download/v0.6.1/dockerize-linux-amd64-v0.6.1.tar.gz | sudo tar -xz -C /usr/local/bin
      - run:
          name: Load Docker images
          command: |
            docker load -i /tmp/workspace/docker-images/experiment.tar
            docker load -i /tmp/workspace/docker-images/control.tar
      - run:
          name: Start containers
          command: |
            cd demo-ecommerce
            yarn shaka-twin-servers start-containers
      - run:
          name: Run rails server (control)
          command: |
            cd demo-ecommerce
            yarn shaka-twin-servers run-cmd control "bundle exec puma -C config/puma.rb -b tcp://0.0.0.0:3000"
          background: true
      - run:
          name: Run rails server (experiment)
          command: |
            cd demo-ecommerce
            yarn shaka-twin-servers run-cmd experiment "bundle exec puma -C config/puma.rb -b tcp://0.0.0.0:3000"
          background: true
      - run:
          name: Wait for servers
          command: |
            dockerize -wait http://localhost:3020/up -timeout 120s
            dockerize -wait http://localhost:3030/up -timeout 120s
      - install-playwright
      - run:
          name: Run visual regression -- generate reference images
          command: |
            cd demo-ecommerce
            yarn visreg:reference
      - run:
          name: Run visual regression -- test
          command: |
            cd demo-ecommerce
            yarn visreg:test
      - run:
          name: Run performance tests
          command: |
            cd demo-ecommerce
            yarn shaka-twin-servers run-cmd-parallel "echo 'Running performance tests...'"
      - store_artifacts:
          path: demo-ecommerce/backstop_data/html_report
          destination: visreg-report
      - store_artifacts:
          path: demo-ecommerce/backstop_data/bitmaps_test
          destination: visreg-screenshots
      - store_test_results:
          path: demo-ecommerce/backstop_data/ci_report
      - store_artifacts:
          path: demo-ecommerce/perf-results
          destination: perf-results

workflows:
  build-and-check:
    jobs:
      - test
      - build-bundles

      # Feature branches: download and compare
      - bundle-size-check:
          requires:
            - build-bundles
          filters:
            branches:
              ignore:
                - main

      # Main branch: upload new baseline
      - bundle-size-upload:
          requires:
            - build-bundles
          filters:
            branches:
              only:
                - main

  # Performance testing workflow with twin servers for A/B testing
  perf-test-twin-servers:
    jobs:
      - build-experiment-image:
          filters:
            branches:
              ignore: main

      - build-control-image:
          filters:
            branches:
              ignore: main

      # Run perf tests after both images are built
      - perf-tests:
          requires:
            - build-experiment-image
            - build-control-image
          filters:
            branches:
              ignore: main
