description: |
  Update the control commit SHA in S3 by uploading the current HEAD SHA.
  Use after tests pass to advance the control commit, or after a manual
  approval gate to force-update when tests fail.

docker:
  - image: cimg/aws:2025.01

resource_class: small

parameters:
  s3-key-prefix:
    type: string
    default: 'perf-tests-baseline-shas'
    description: 'S3 key prefix. The full key will be <prefix>/git-sha.txt'

steps:
  - checkout
  - upload-control-commit-sha:
      s3-key-prefix: << parameters.s3-key-prefix >>
