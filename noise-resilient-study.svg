<svg viewBox="0 0 640 380" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="13">
  <rect width="100%" height="100%" fill="white"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
  </defs>

  <!-- SEQUENTIAL -->
  <text x="0" y="18" font-weight="bold">SEQUENTIAL — pair sees DIFFERENT noise (unfair, slow)</text>

  <text x="0" y="55">CPU load</text>
  <path d="M 120,64 L 130,60 L 145,55 L 160,42 L 180,48 L 200,38 L 220,46 L 240,40 L 260,52 L 280,42 L 300,36 L 320,46 L 340,40 L 360,52 L 380,46 L 400,50 L 420,54 L 440,60 L 460,62 L 480,58 L 500,62 L 520,57 L 540,62 L 560,60 L 580,63 L 600,64 Z"
        fill="#fcc" stroke="#c33" stroke-width="1"/>

  <text x="0" y="87">control</text>
  <rect x="160" y="72" width="280" height="24" fill="#cce7ff" stroke="#36c"/>
  <text x="300" y="88" text-anchor="middle" font-size="11">measurement</text>

  <text x="0" y="119">experiment</text>
  <rect x="452" y="104" width="140" height="24" fill="#cce7ff" stroke="#36c"/>
  <text x="522" y="120" text-anchor="middle" font-size="11">measurement</text>

  <!-- Time arrow for SEQUENTIAL -->
  <line x1="100" y1="148" x2="600" y2="148" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="350" y="164" text-anchor="middle" font-size="12" fill="#666">time</text>

  <!-- SIMULTANEOUS -->
  <text x="0" y="190" font-weight="bold">SIMULTANEOUS — pair sees the SAME noise (fair, fast)</text>

  <text x="0" y="227">CPU load</text>
  <path d="M 120,236 L 130,232 L 145,227 L 160,214 L 180,220 L 200,210 L 220,218 L 240,212 L 260,224 L 280,214 L 300,208 L 320,218 L 340,212 L 360,224 L 380,218 L 400,222 L 420,226 L 440,232 L 460,234 L 480,230 L 500,234 L 520,229 L 540,234 L 560,232 L 580,235 L 600,236 Z"
        fill="#fcc" stroke="#c33" stroke-width="1"/>

  <text x="0" y="259">control</text>
  <rect x="160" y="244" width="280" height="24" fill="#cce7ff" stroke="#36c"/>
  <text x="300" y="260" text-anchor="middle" font-size="11">measurement 1</text>
  <rect x="460" y="244" width="130" height="24" fill="#cce7ff" stroke="#36c"/>
  <text x="525" y="260" text-anchor="middle" font-size="11">measurement 2</text>

  <text x="0" y="291">experiment</text>
  <rect x="160" y="276" width="265" height="24" fill="#cce7ff" stroke="#36c"/>
  <text x="293" y="292" text-anchor="middle" font-size="11">measurement 1</text>
  <rect x="460" y="276" width="140" height="24" fill="#cce7ff" stroke="#36c"/>
  <text x="530" y="292" text-anchor="middle" font-size="11">measurement 2</text>

  <!-- Time arrow for SIMULTANEOUS -->
  <line x1="100" y1="330" x2="600" y2="330" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="350" y="350" text-anchor="middle" font-size="12" fill="#666">time</text>

  <!-- Annotation: late measurements are faster -->
  <g font-style="italic" fill="#774">
    <text x="500" y="190" font-size="12" text-anchor="middle">when CPU activity is low,</text>
    <text x="500" y="205" font-size="12" text-anchor="middle">measurements are faster</text>
  </g>
</svg>
